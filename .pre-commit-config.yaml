repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: pathcrumb
        name: pathcrumb header check
        entry: pathcrumb check --fail-on-missing
        language: system
        types: [python]
