# .github/workflows/release.yml

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.4.*

      - name: Build package
        run: uv build

      - name: Check package
        run: pip install twine && twine check dist/*

      - name: Verify dist
        run: ls -lh dist

      - name: Publish to PyPI
        run: uv publish --no-interaction
