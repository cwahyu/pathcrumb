[project]
name = "pathcrumb"
version = "0.1.0"
description = "Keep Python file headers aligned with their relative paths"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "typer",
]

[project.scripts]
pathcrumb = "pathcrumb.cli:app"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=9.0",
    "pytest-cov>=7.0",
    "ruff>=0.15.6",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
